# Overrides the webhook namespaceSelector to match the kustomize deployment namespace.
# The base patch uses "github-configuration" (production value), but in the kustomize
# flow all resources live in git-hubby-system.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
  - name: vorganization-v1alpha1.kb.io
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: git-hubby-system
  - name: vrepository-v1alpha1.kb.io
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: git-hubby-system

