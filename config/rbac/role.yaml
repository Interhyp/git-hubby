---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: manager-role
  namespace: github-configuration
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - github.interhyp.de
  resources:
  - autolinkspresets
  - codesecurityconfigurations
  - rulesetpresets
  - webhookignorepresets
  - webhookpresets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - github.interhyp.de
  resources:
  - organizations
  - repositories
  - teams
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - github.interhyp.de
  resources:
  - organizations/finalizers
  - repositories/finalizers
  - teams/finalizers
  verbs:
  - update
- apiGroups:
  - github.interhyp.de
  resources:
  - organizations/status
  - repositories/status
  - teams/status
  verbs:
  - get
  - patch
  - update
