# Role and RoleBinding for accessing the GitHub App credentials secret in the controller's namespace.
# This cannot be generated via RBAC markers because kustomize's global namespace transformer
# would override the explicit namespace, causing a conflict with the main manager-role.
# Must be maintained manually.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: app-credentials-role
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-credentials-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: app-credentials-role
subjects:
- kind: ServiceAccount
  name: controller-manager
  namespace: system


