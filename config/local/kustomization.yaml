apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: git-hubby-system
namePrefix: git-hubby-

# Explicit resources without webhooks, cert-manager, or prometheus
resources:
  - ../crd
  - ../rbac
  - ../manager
  - ../network-policy
  - metrics_service.yaml
  - secrets.yaml

patches:
  - path: manager_metrics_patch.yaml
    target:
      kind: Deployment
  - path: manager_watch_namespace_patch.yaml
    target:
      kind: Deployment