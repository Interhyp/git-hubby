name: Build & Release

on:
  push:
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-publish:
    name: Build & Publish Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (verify build succeeds)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:build-verify
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
        env:
          DOCKER_BUILD_SUMMARY: false

      - name: Setup Node.js
        if: github.ref == 'refs/heads/main'
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install semantic-release plugins
        if: github.ref == 'refs/heads/main'
        run: npm ci

      - name: Get latest tag before release
        id: before
        if: github.ref == 'refs/heads/main'
        run: |
          git fetch --tags
          echo "tag=$(git tag --sort=-v:refname | head -1)" >> "$GITHUB_OUTPUT"

      - name: Run semantic-release
        id: semantic
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Detect new release
        id: release
        if: github.ref == 'refs/heads/main'
        run: |
          git fetch --tags
          LATEST_TAG=$(git tag --sort=-v:refname | head -1)
          if [[ "$LATEST_TAG" != "${{ steps.before.outputs.tag }}" ]]; then
            VERSION="${LATEST_TAG#v}"
            echo "new_release_published=true" >> "$GITHUB_OUTPUT"
            echo "new_release_version=${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "new_release_published=false" >> "$GITHUB_OUTPUT"
            echo "new_release_version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate image tags
        id: tags
        run: |
          if [[ "${{ github.ref_name }}" == "main" && "${{ steps.release.outputs.new_release_published }}" == "true" ]]; then
            VERSION="${{ steps.release.outputs.new_release_version }}"
            echo "tags=${REGISTRY}/${IMAGE_NAME}:${VERSION},${REGISTRY}/${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            SHORT_SHA="$(git rev-parse --short HEAD)"
            echo "tags=${REGISTRY}/${IMAGE_NAME}:main-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "version=main-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          else
            BRANCH="$(echo '${{ github.ref_name }}' | sed 's|[^a-zA-Z0-9._-]|-|g' | cut -c1-50)"
            SHORT_SHA="$(git rev-parse --short HEAD)"
            echo "tags=${REGISTRY}/${IMAGE_NAME}:snapshot-${BRANCH}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "version=snapshot-${BRANCH}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Push image with final tags
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.tags.outputs.version }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

