name: Update Helm Chart

on:
  workflow_run:
    workflows: ["Build & Release"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  HELM_REPO: Interhyp/git-hubby-helm
  CHART_DIR: helm-chart

jobs:
  update-helm-chart:
    name: Update Helm Chart CRDs and appVersion
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Determine source branch
        id: source
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "branch=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "branch=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout source repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ steps.source.outputs.branch }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Determine image version
        id: version
        run: |
          if [[ "${{ steps.source.outputs.branch }}" == "main" ]]; then
            git fetch --tags
            LATEST_TAG=$(git tag --sort=-v:refname | head -1)
            if [[ -n "$LATEST_TAG" ]]; then
              VERSION="${LATEST_TAG#v}"
            else
              SHORT_SHA="$(git rev-parse --short HEAD)"
              VERSION="main-${SHORT_SHA}"
            fi
          else
            BRANCH="$(echo '${{ steps.source.outputs.branch }}' | sed 's|[^a-zA-Z0-9._-]|-|g' | cut -c1-50)"
            SHORT_SHA="$(git rev-parse --short ${{ steps.source.outputs.sha }})"
            VERSION="snapshot-${BRANCH}-${SHORT_SHA}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Image version: ${VERSION}"

      - name: Generate CRDs
        run: make manifests

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.HELM_APP_ID }}
          private-key: ${{ secrets.HELM_APP_PRIVATE_KEY }}
          owner: Interhyp
          repositories: git-hubby-helm

      - name: Checkout Helm chart repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ${{ env.HELM_REPO }}
          token: ${{ steps.app-token.outputs.token }}
          path: ${{ env.CHART_DIR }}

      - name: Determine target branch
        id: branch
        run: |
          if [[ "${{ steps.source.outputs.branch }}" == "main" ]]; then
            echo "name=auto-update/v${{ steps.version.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=auto-update/${{ steps.source.outputs.branch }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout or create target branch
        working-directory: ${{ env.CHART_DIR }}
        run: |
          git fetch origin "${{ steps.branch.outputs.name }}" 2>/dev/null && \
            git checkout "${{ steps.branch.outputs.name }}" || \
            git checkout -b "${{ steps.branch.outputs.name }}"

      - name: Update CRDs in Helm chart
        run: cp config/crd/bases/*.yaml ${{ env.CHART_DIR }}/crds/

      - name: Update appVersion in Helm chart
        run: |
          if [[ -f ${{ env.CHART_DIR }}/Chart.yaml ]]; then
            sed -i "s|^appVersion:.*|appVersion: \"${{ steps.version.outputs.version }}\"|" ${{ env.CHART_DIR }}/Chart.yaml
          fi

      - name: Determine commit type from version change
        id: commit-type
        run: |
          # Extract current appVersion from the chart (before update was applied above — read from git)
          CURRENT_VERSION=$(cd ${{ env.CHART_DIR }} && git show HEAD:Chart.yaml 2>/dev/null | grep "^appVersion:" | sed 's/^appVersion: *"\?//;s/"\? *$//' || echo "")
          NEW_VERSION="${{ steps.version.outputs.version }}"
          SOURCE_REPO="https://github.com/${{ github.repository }}"

          # Helper: extract semver triple (MAJOR.MINOR.PATCH) from a version string, returns "" if not semver
          semver() { echo "$1" | grep -oP '^\d+\.\d+\.\d+' || true; }

          CURRENT_SV=$(semver "$CURRENT_VERSION")
          NEW_SV=$(semver "$NEW_VERSION")

          if [[ -z "$CURRENT_SV" || -z "$NEW_SV" ]]; then
            # Non-semver (e.g. snapshot builds) — use chore, link to the commit
            COMMIT_TYPE="chore"
            COMPARE_URL="${SOURCE_REPO}/commit/${{ steps.source.outputs.sha }}"
          else
            CURRENT_MAJOR=$(echo "$CURRENT_SV" | cut -d. -f1)
            CURRENT_MINOR=$(echo "$CURRENT_SV" | cut -d. -f2)
            NEW_MAJOR=$(echo "$NEW_SV" | cut -d. -f1)
            NEW_MINOR=$(echo "$NEW_SV" | cut -d. -f2)

            if (( NEW_MAJOR > CURRENT_MAJOR )); then
              COMMIT_TYPE="feat!"
            elif (( NEW_MINOR > CURRENT_MINOR )); then
              COMMIT_TYPE="feat"
            else
              COMMIT_TYPE="fix"
            fi

            COMPARE_URL="${SOURCE_REPO}/compare/v${CURRENT_SV}...v${NEW_SV}"
          fi

          echo "type=${COMMIT_TYPE}" >> "$GITHUB_OUTPUT"
          echo "compare_url=${COMPARE_URL}" >> "$GITHUB_OUTPUT"
          echo "Detected commit type: ${COMMIT_TYPE} (${CURRENT_VERSION} → ${NEW_VERSION})"
          echo "Compare URL: ${COMPARE_URL}"

      - name: Commit and push changes
        id: commit
        working-directory: ${{ env.CHART_DIR }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "${{ steps.commit-type.outputs.type }}: update CRDs and appVersion to version ${{ steps.version.outputs.version }}" \
            -m "${{ steps.commit-type.outputs.compare_url }}"
          git push origin "${{ steps.branch.outputs.name }}"
          echo "changes=true" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request for main branch
        if: steps.source.outputs.branch == 'main' && steps.commit.outputs.changes == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          cd ${{ env.CHART_DIR }}
          # Ensure the label exists
          gh label create "automatic-update" --description "Automated updates" --color "0E8A16" --repo "${{ env.HELM_REPO }}" 2>/dev/null || true
          PR_BODY="Automated CRD and appVersion update from [git-hubby release v${{ steps.version.outputs.version }}](https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }})"$'\n\n'"**Changelog diff:** ${{ steps.commit-type.outputs.compare_url }}"
          EXISTING_PR=$(gh pr list --head "${{ steps.branch.outputs.name }}" --json number --jq '.[0].number' 2>/dev/null || true)
          if [[ -n "$EXISTING_PR" ]]; then
            echo "PR #${EXISTING_PR} already exists, updating..."
            gh pr edit "$EXISTING_PR" \
              --title "${{ steps.commit-type.outputs.type }}: update CRDs and appVersion to v${{ steps.version.outputs.version }}" \
              --body "$PR_BODY"
          else
            gh pr create \
              --repo "${{ env.HELM_REPO }}" \
              --head "${{ steps.branch.outputs.name }}" \
              --base main \
              --title "${{ steps.commit-type.outputs.type }}: update CRDs and appVersion to v${{ steps.version.outputs.version }}" \
              --body "$PR_BODY" \
              --label "automatic-update"
          fi
