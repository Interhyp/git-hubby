name: Update Helm Chart

on:
  workflow_run:
    workflows: ["Build & Release"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  HELM_REPO: Interhyp/git-hubby-helm
  CHART_DIR: helm-chart

jobs:
  update-helm-chart:
    name: Update Helm Chart CRDs and appVersion
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Determine source branch
        id: source
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "branch=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "branch=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout source repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.source.outputs.branch }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Determine image version
        id: version
        run: |
          if [[ "${{ steps.source.outputs.branch }}" == "main" ]]; then
            git fetch --tags
            LATEST_TAG=$(git tag --sort=-v:refname | head -1)
            if [[ -n "$LATEST_TAG" ]]; then
              VERSION="${LATEST_TAG#v}"
            else
              SHORT_SHA="$(git rev-parse --short HEAD)"
              VERSION="main-${SHORT_SHA}"
            fi
          else
            BRANCH="$(echo '${{ steps.source.outputs.branch }}' | sed 's|[^a-zA-Z0-9._-]|-|g' | cut -c1-50)"
            SHORT_SHA="$(git rev-parse --short ${{ steps.source.outputs.sha }})"
            VERSION="snapshot-${BRANCH}-${SHORT_SHA}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Image version: ${VERSION}"

      - name: Generate CRDs
        run: make manifests

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.HELM_APP_ID }}
          private-key: ${{ secrets.HELM_APP_PRIVATE_KEY }}
          owner: Interhyp
          repositories: git-hubby-helm

      - name: Checkout Helm chart repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ env.HELM_REPO }}
          token: ${{ steps.app-token.outputs.token }}
          path: ${{ env.CHART_DIR }}

      - name: Determine target branch
        id: branch
        run: |
          if [[ "${{ steps.source.outputs.branch }}" == "main" ]]; then
            echo "name=auto-update/v${{ steps.version.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=auto-update/${{ steps.source.outputs.branch }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout or create target branch
        working-directory: ${{ env.CHART_DIR }}
        run: |
          git fetch origin "${{ steps.branch.outputs.name }}" 2>/dev/null && \
            git checkout "${{ steps.branch.outputs.name }}" || \
            git checkout -b "${{ steps.branch.outputs.name }}"

      - name: Update CRDs in Helm chart
        run: cp config/crd/bases/*.yaml ${{ env.CHART_DIR }}/crds/

      - name: Update appVersion in Helm chart
        run: |
          if [[ -f ${{ env.CHART_DIR }}/Chart.yaml ]]; then
            sed -i "s|^appVersion:.*|appVersion: \"${{ steps.version.outputs.version }}\"|" ${{ env.CHART_DIR }}/Chart.yaml
          fi

      - name: Commit and push changes
        id: commit
        working-directory: ${{ env.CHART_DIR }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "feat: update CRDs and appVersion to version ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.branch.outputs.name }}"
          echo "changes=true" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request for main branch
        if: steps.source.outputs.branch == 'main' && steps.commit.outputs.changes == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          cd ${{ env.CHART_DIR }}
          # Ensure the label exists
          gh label create "automatic-update" --description "Automated updates" --color "0E8A16" --repo "${{ env.HELM_REPO }}" 2>/dev/null || true
          EXISTING_PR=$(gh pr list --head "${{ steps.branch.outputs.name }}" --json number --jq '.[0].number' 2>/dev/null || true)
          if [[ -n "$EXISTING_PR" ]]; then
            echo "PR #${EXISTING_PR} already exists, updating..."
            gh pr edit "$EXISTING_PR" \
              --title "feat: update CRDs and appVersion to v${{ steps.version.outputs.version }}" \
              --body "Automated CRD and appVersion update from [git-hubby release v${{ steps.version.outputs.version }}](https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }})"
          else
            gh pr create \
              --repo "${{ env.HELM_REPO }}" \
              --head "${{ steps.branch.outputs.name }}" \
              --base main \
              --title "feat: update CRDs and appVersion to v${{ steps.version.outputs.version }}" \
              --body "Automated CRD and appVersion update from [git-hubby release v${{ steps.version.outputs.version }}](https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }})" \
              --label "automatic-update"
          fi
